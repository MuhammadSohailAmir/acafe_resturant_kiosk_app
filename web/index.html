<!DOCTYPE html><html><head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Acafe Kiosk">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Acafe">
  <link rel="apple-touch-icon" href="favicon.png">
  <title>Acafe</title>
  <link rel="manifest" href="manifest.json">
  <link rel="shortcut icon" type="image/png" href="favicon.png">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">

  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background-color: #E8E6DF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    flutter-loader, .flutter-loader, #flutter-loading, .loading-progress, progress {
      display: none !important;
    }
    #kiosk-instant-login {
      box-sizing: border-box;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px 28px;
      color: #2B2B2B;
    }
    #kiosk-instant-login .wrap {
      width: 100%;
      max-width: 520px;
    }
    #kiosk-instant-login h1 {
      margin: 8px 0 10px;
      text-align: center;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 4px;
    }
    #kiosk-instant-login h2 {
      margin: 0 0 6px;
      text-align: center;
      font-size: 18px;
      font-weight: 600;
    }
    #kiosk-instant-login p {
      margin: 0 0 36px;
      text-align: center;
      font-size: 14px;
      color: rgba(43, 43, 43, 0.6);
    }
    #kiosk-instant-login label {
      display: block;
      margin-bottom: 8px;
      font-size: 15px;
      font-weight: 600;
    }
    #kiosk-instant-login .field {
      margin-bottom: 22px;
    }
    #kiosk-instant-login input {
      width: 100%;
      box-sizing: border-box;
      padding: 20px 18px;
      border: 1px solid rgba(43, 43, 43, 0.12);
      border-radius: 14px;
      background: #fff;
      font-size: 18px;
    }
    #kiosk-instant-login button {
      width: 100%;
      height: 60px;
      margin-top: 10px;
      border: 0;
      border-radius: 16px;
      background: #2B2B2B;
      color: #fff;
      font-size: 19px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .grecaptcha-badge { visibility: hidden; }
  </style>

  <script>
    var serviceWorkerVersion = {{flutter_service_worker_version}};
  </script>
  <script src="flutter.js?version=11.5.0" defer></script>
</head>
<body>

<div id="kiosk-instant-login">
  <div class="wrap">
    <h1>ACAFE</h1>
    <h2>Device Login</h2>
    <p>Sign in once to bind this kiosk to its branch.</p>
    <div class="field">
      <label>Username</label>
      <input type="text" placeholder="Enter username" disabled>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" placeholder="••••••••" disabled>
    </div>
    <button type="button" disabled>Login</button>
  </div>
</div>

<script>
  if (typeof(Storage) !== "undefined") {
    localStorage.removeItem("flutter.theme");
  }
</script>

<script defer>
  {{flutter_js}}
  {{flutter_build_config}}

  _flutter.loader.load({
    serviceWorker: {
      serviceWorkerVersion: {{flutter_service_worker_version}},
    },
    onEntrypointLoaded: function(engineInitializer) {
      engineInitializer.initializeEngine({ renderer: 'html' }).then(function(appRunner) {
        appRunner.runApp();
      });
    }
  });
</script>

<script defer>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/firebase-messaging-sw.js").catch(function() {});
  }
</script>

</body></html>
