<!DOCTYPE html><html><head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Acafe Kiosk">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Acafe">
  <link rel="apple-touch-icon" href="favicon.png">
  <title>Acafe</title>
  <link rel="manifest" href="manifest.json">
  <link rel="shortcut icon" type="image/png" href="favicon.png">
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">

  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background-color: #E8E6DF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    flutter-loader, .flutter-loader, #flutter-loading, .loading-progress, progress {
      display: none !important;
    }
    .grecaptcha-badge { visibility: hidden; }
  </style>

  <script>
    var serviceWorkerVersion = {{flutter_service_worker_version}};
  </script>
  <script src="flutter.js?version=11.5.0" defer></script>
</head>
<body>

<script>
  if (typeof(Storage) !== "undefined") {
    localStorage.removeItem("flutter.theme");
  }
</script>

<script defer>
  {{flutter_js}}
  {{flutter_build_config}}

  _flutter.loader.load({
    serviceWorker: {
      serviceWorkerVersion: {{flutter_service_worker_version}},
    },
    onEntrypointLoaded: function(engineInitializer) {
      engineInitializer.initializeEngine({ renderer: 'html' }).then(function(appRunner) {
        appRunner.runApp();
      });
    }
  });
</script>

</body></html>
