name: acafe_kiosk
description: Acafe kiosk ordering application.
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.3.4 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any

  cupertino_icons: ^1.0.8
  get_it: ^7.7.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  dio: ^5.4.3+1
  http: ^0.13.6
  image_picker: ^1.1.1
  google_maps_flutter_web: ^0.5.7
  google_maps_flutter: ^2.14.2
  geocoding: ^3.0.0
  geolocator: ^11.1.0
  shimmer_animation: ^2.1.0+1
  carousel_slider: ^5.0.0
  url_launcher: ^6.2.6
  firebase_core: ^3.11.0
  firebase_messaging: ^15.2.2
  flutter_local_notifications: ^17.1.2
  flutter_native_splash: ^2.4.0
  path_provider: ^2.1.3
  url_strategy: ^0.3.0
  universal_html: ^2.2.4
  country_code_picker: ^3.2.0
  scroll_to_index: ^3.0.1
  app_links: ^6.0.2
  go_router: 12.1.3
  firebase_auth: ^5.4.0
  flutter_svg: ^2.0.9
  flutter_inappwebview: ^6.1.5
  just_the_tooltip: ^0.0.12
  drift: ^2.25.0
  drift_flutter: ^0.2.4
  dotted_line: ^3.2.3
  cached_network_image_platform_interface:
  collection: any
  video_player: ^2.9.2
  qr_flutter: ^4.1.0
  cached_network_image: ^3.3.1
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^5.0.6
  sign_in_with_apple: ^6.1.0

  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^4.0.0
  drift_dev: ^2.25.1
  build_runner: ^2.4.13

  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/image/
    - assets/svg/
    - assets/language/
    - assets/video/
    - assets/payment/

  fonts:
    - family: Rubik
      fonts:
        - asset: assets/fonts/NunitoSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/NunitoSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/NunitoSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NunitoSans-Bold.ttf
          weight: 700

    - family: Loew
      fonts:
        - asset: assets/fonts/Loew-Regular.ttf
          weight: 400
        - asset: assets/fonts/Loew-Medium.ttf
          weight: 500
        - asset: assets/fonts/Loew-Bold.ttf
          weight: 700
        - asset: assets/fonts/Loew-ExtraBold.ttf
          weight: 800

    - family: Swiss721
      fonts:
        - asset: assets/fonts/Swiss721-Light.ttf
          weight: 300

    - family: ScotchDisplay
      fonts:
        - asset: assets/fonts/ScotchDisplay-Light.ttf
          weight: 300
